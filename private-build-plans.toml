[buildPlans.AnthrosevkaMono]
family = "Anthrosevka Mono"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.AnthrosevkaMono.variants.design]
one = "base"
two = "straight-neck-serifless"
four = "closed-serifless"
five = "oblique-arched-serifless"
eight = "crossing"
zero = "dotted"
capital-d = "standard-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-j = "serifless"
capital-k = "symmetric-touching-serifless"
capital-q = "straight"
a = "double-storey-tailed"
f = "flat-hook-serifless-crossbar-at-x-height"
g = "double-storey"
j = "flat-hook-serifed"
k = "symmetric-touching-serifless"
r = "compact-serifless"
t = "flat-hook-short-neck"
u = "toothless-rounded-serifless"
w = "straight-flat-top-serifless"
question = "corner"

[buildPlans.AnthrosevkaMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.AnthrosevkaMono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.AnthrosevkaMono.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.AnthrosevkaMono.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.AnthrosevkaMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.AnthrosevkaMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
